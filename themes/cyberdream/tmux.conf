# generated by `theme build` — do not edit
# Sourced by ~/.tmux.conf via `source-file ~/.config/themes/current/tmux.conf`.
set -g status-style bg=#16181A,fg=#FFFFFF
set -g status-left-style bg=#16181A,fg=#FFFFFF
set -g status-right-style bg=#16181A,fg=#FFFFFF
set -g window-status-style bg=#16181A,fg=#7B8496
set -g window-status-current-style bg=#FFBD5E,fg=#16181A
set -g window-status-activity-style bg=#16181A,fg=#BD5EFF
set -g pane-border-style fg=#3C4048
set -g pane-active-border-style fg=#FFBD5E
set -g message-style bg=#16181A,fg=#FFFFFF
set -g message-command-style bg=#16181A,fg=#FFFFFF
set -g mode-style bg=#BD5EFF,fg=#16181A

set -g window-status-separator ""
set -g status-left ""
set -g status-right "#[fg=#FFFFFF,bg=#16181A] #[bg=#FFFFFF,fg=#16181A]#S#[fg=#FFFFFF,bg=#16181A]"

set -g window-status-format "#[fg=#7B8496,bg=#16181A] #W "
set -g window-status-current-format "#[fg=#FFBD5E,bg=#16181A] #[fg=#16181A,bg=#FFBD5E]#W#[fg=#FFBD5E,bg=#16181A]"