[username]
disabled = true
show_always = true
style_user = "bg:keyword fg:background"
style_root = "bg:keyword fg:background"
format = '[ $user ]($style)'

[directory]
style = "fg:background bg:property"
format = "[$path]($style)"
truncation_length = 1
fish_style_pwd_dir_length = 1
truncation_symbol = ""
truncate_to_repo = false

[git_branch]
symbol = ""
style = "bg:property"
format = '[[ $symbol $branch ](fg:background bg:number)]($style)'

[git_status]
style = "bg:property"
format = '[[($all_status$ahead_behind )](fg:background bg:number)]($style)'

[nodejs]
symbol = ""
style = "bg:property"
format = '[[ $symbol( $version) ](fg:background bg:property)]($style)'

[c]
symbol = " "
style = "bg:property"
format = '[[ $symbol( $version) ](fg:background bg:property)]($style)'

[rust]
symbol = ""
style = "bg:property"
format = '[[ $symbol( $version) ](fg:background bg:property)]($style)'

[golang]
symbol = ""
style = "bg:property"
format = '[[ $symbol( $version) ](fg:background bg:property)]($style)'

[php]
symbol = ""
style = "bg:property"
format = '[[ $symbol( $version) ](fg:foreground bg:property)]($style)'

[java]
symbol = " "
style = "bg:property"
format = '[[ $symbol( $version) ](fg:foreground bg:property)]($style)'

[kotlin]
symbol = ""
style = "bg:property"
format = '[[ $symbol( $version) ](fg:foreground bg:property)]($style)'

[haskell]
symbol = ""
style = "bg:property"
format = '[[ $symbol( $version) ](fg:foreground bg:property)]($style)'

[python]
symbol = ""
style = "bg:property"
format = '[[ $symbol( $version) ](fg:foreground bg:property)]($style)'

[docker_context]
symbol = ""
style = "bg:background"
format = '[[ $symbol( $context) ](fg:info bg:background)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:keyword"
format = '[[  $time ](fg:background bg:keyword)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ïگ²](bold fg:string)'
error_symbol = '[ïگ²](bold fg:error)'
vimcmd_symbol = '[ïگ´](bold fg:string)'
vimcmd_replace_one_symbol = '[ïگ´](bold fg:keyword)'
