# generated by `theme build` — do not edit
"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 100

format = """
[](accent)\
$os\
$username\
[](bg:color4 fg:accent)\
[](fg:color4 bg:color6)\
$directory\
[](fg:color6 bg:color3)\
[](fg:color3 bg:color9)\
$git_branch\
$git_status\
[](fg:color9 bg:color2)\
[](fg:color2 bg:color4)\
$docker_context\
[ ](fg:color4)\
$line_break$character"""

palette = 'theme'

[palettes.theme]
accent               = "#aaaaff"
cursor               = "#f1e9d2"
foreground           = "#f1e9d2"
background           = "#252623"
selection_foreground = "#f1e9d2"
selection_background = "#3a3d37"
color0  = "#111210"
color1  = "#e75a7c"
color2  = "#8fb573"
color3  = "#dbb651"
color4  = "#57a5e5"
color5  = "#aaaaff"
color6  = "#70c2be"
color7  = "#f1e9d2"
color8  = "#5b5e5a"
color9  = "#e75a7c"
color10 = "#8fb573"
color11 = "#dbb651"
color12 = "#57a5e5"
color13 = "#aaaaff"
color14 = "#70c2be"
color15 = "#f1e9d2"

[os]
disabled = false
style = "bg:accent fg:background"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = ""
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
disabled = true
show_always = true
style_user = "bg:accent fg:background"
style_root = "bg:accent fg:background"
format = '[ $user ]($style)'

[directory]
style = "fg:background bg:color6"
format = "[$path]($style)"
truncation_length = 1
fish_style_pwd_dir_length = 1
truncation_symbol = ""
truncate_to_repo = false

[git_branch]
symbol = ""
style = "bg:color6"
format = '[[ $symbol $branch ](fg:background bg:color9)]($style)'

[git_status]
style = "bg:color6"
format = '[[($all_status$ahead_behind )](fg:background bg:color9)]($style)'

[nodejs]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[c]
symbol = " "
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[rust]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[golang]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[php]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[java]
symbol = " "
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[kotlin]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[haskell]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[python]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[docker_context]
symbol = ""
style = "bg:color0"
format = '[[ $symbol( $context) ](fg:color4 bg:color8)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:accent"
format = '[[  $time ](fg:background bg:accent)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:color2)'
error_symbol = '[](bold fg:color1)'
vimcmd_symbol = '[](bold fg:color2)'
vimcmd_replace_one_symbol = '[](bold fg:accent)'
vimcmd_replace_symbol = '[](bold fg:accent)'
vimcmd_visual_symbol = '[](bold fg:accent)'