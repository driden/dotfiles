"$schema" = 'https://starship.rs/config-schema.json'

command_timeout=100
#$c\
#$rust\
#$golang\
#$nodejs\
#$php\
#$kotlin\
#$haskell\
#$python\
format = """
[î‚¶](keyword)\
$os\
$username\
[î‚°](bg:function fg:keyword)\ 
[î‚°](fg:function bg:property)\
$directory\
[î‚°](fg:property bg:type)\
[î‚°](fg:type bg:number)\
$git_branch\
$git_status\
[î‚°](fg:number bg:string)\
[î‚°](fg:string bg:function)\
$docker_context\
[î‚´ ](fg:function)\
$line_break$character"""

palette = 'theme'

[palettes.theme]
background = "#252623"
foreground = "#F1E9D2"
keyword    = "#AAAAFF"
string     = "#8FB573"
function   = "#57A5E5"
type       = "#DBB651"
number     = "#FF9966"
constant   = "#FF9966"
property   = "#70C2BE"
error      = "#E75A7C"
warning    = "#DBB651"
info       = "#70C2BE"

[os]
disabled = false
style = "bg:keyword fg:background"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
SUSE = "ïŒ”"
Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "ï£؟"
Manjaro = "ïŒ’"
Linux = "َ°Œ½"
Gentoo = "َ°£¨"
Fedora = "َ°£›"
Alpine = "ïŒ€"
Amazon = "ï‰°"
Android = "îœژ"
Arch = "َ°£‡"
Artix = "َ°£‡"
CentOS = "ïŒ„"
Debian = "َ°£ڑ"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"

[username]
disabled = true
show_always = true
style_user = "bg:keyword fg:background"
style_root = "bg:keyword fg:background"
format = '[ $user ]($style)'

[directory]
style = "fg:background bg:property"
format = "[$path]($style)"
truncation_length = 1
fish_style_pwd_dir_length = 1
truncation_symbol = ""
truncate_to_repo = false

[git_branch]
symbol = "ïگک"
style = "bg:property"
format = '[[ $symbol $branch ](fg:background bg:number)]($style)'

[git_status]
style = "bg:property"
format = '[[($all_status$ahead_behind )](fg:background bg:number)]($style)'

[nodejs]
symbol = "îœک"
style = "bg:property"
format = '[[ $symbol( $version) ](fg:background bg:property)]($style)'

[c]
symbol = "îک‍ "
style = "bg:property"
format = '[[ $symbol( $version) ](fg:background bg:property)]($style)'

[rust]
symbol = "î‍¨"
style = "bg:property"
format = '[[ $symbol( $version) ](fg:background bg:property)]($style)'

[golang]
symbol = "îک§"
style = "bg:property"
format = '[[ $symbol( $version) ](fg:background bg:property)]($style)'

[php]
symbol = "îکˆ"
style = "bg:property"
format = '[[ $symbol( $version) ](fg:foreground bg:property)]($style)'

[java]
symbol = "î‰– "
style = "bg:property"
format = '[[ $symbol( $version) ](fg:foreground bg:property)]($style)'

[kotlin]
symbol = "îک´"
style = "bg:property"
format = '[[ $symbol( $version) ](fg:foreground bg:property)]($style)'

[haskell]
symbol = "îکں"
style = "bg:property"
format = '[[ $symbol( $version) ](fg:foreground bg:property)]($style)'

[python]
symbol = "îک†"
style = "bg:property"
format = '[[ $symbol( $version) ](fg:foreground bg:property)]($style)'

[docker_context]
symbol = "ïŒˆ"
style = "bg:background"
format = '[[ $symbol( $context) ](fg:info bg:background)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:keyword"
format = '[[ ïگ؛ $time ](fg:background bg:keyword)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ïگ²](bold fg:string)'
error_symbol = '[ïگ²](bold fg:error)'
vimcmd_symbol = '[ïگ´](bold fg:string)'
vimcmd_replace_one_symbol = '[ïگ´](bold fg:keyword)'
vimcmd_replace_symbol = '[ïگ´](bold fg:keyword)'
vimcmd_visual_symbol = '[ïگ´](bold fg:keyword)'
