palette = 'theme'

[palettes.theme]
background           = "#252623"
foreground           = "#F1E9D2"
cursor               = "#F1E9D2"
selection_background = "#3A3D37"
selection_foreground = "#F1E9D2"
comment              = "#E2C792"
keyword              = "#AAAAFF"
string               = "#8FB573"
function             = "#57A5E5"
type                 = "#DBB651"
number               = "#FF9966"
variable             = "#F1E9D2"
constant             = "#FF9966"
operator             = "#C5C2EE"
property             = "#70C2BE"
parameter            = "#F08080"
error                = "#E75A7C"
warning              = "#DBB651"
info                 = "#70C2BE"
hint                 = "#AAAAFF"

[os]
disabled = false
style = "bg:keyword fg:background"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
SUSE = "ïŒ”"
