# generated by `theme build` — do not edit
"$schema" = 'https://starship.rs/config-schema.json'

command_timeout=100
#$c\
#$rust\
#$golang\
#$nodejs\
#$php\
#$kotlin\
#$haskell\
#$python\
format = """
[](color12)\
$os\
[](fg:color12 bg:accent)\ 
[](fg:accent bg:color5)\
$directory\
[](fg:color5 bg:cursor)\
[](fg:cursor bg:color13)\
$git_branch\
$git_status\
[](fg:color9 bg:color2)\
[](fg:color2 bg:color4)\
$docker_context\
[ ](fg:color4)\
$line_break$character"""

palette = 'theme'

[palettes.theme]
accent               = "#FFA066"
cursor               = "#dcd7ba"
foreground           = "#dcd7ba"
background           = "#1f1f28"
selection_foreground = "#dcd7ba"
selection_background = "#223249"
color0  = "#16161D"
color1  = "#C34043"
color2  = "#76946A"
color3  = "#C0A36E"
color4  = "#7E9CD8"
color5  = "#957FB8"
color6  = "#6A9589"
color7  = "#C8C093"
color8  = "#727169"
color9  = "#E82424"
color10 = "#98BB6C"
color11 = "#E6C384"
color12 = "#7FB4CA"
color13 = "#938AA9"
color14 = "#7AA89F"
color15 = "#DCD7BA"

[os]
disabled = false
style = "bg:color12 fg:foreground"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = ""
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[directory]
style = "fg:background bg:color5"
format = "[$path]($style)"
truncation_length = 1
fish_style_pwd_dir_length = 1
truncation_symbol = ""
truncate_to_repo = false

[git_branch]
symbol = ""
style = "bg:color6"
format = '[[ $symbol $branch ](fg:cursor bg:color13)]($style)'

[git_status]
style = "bg:color6"
format = '[[($all_status$ahead_behind )](fg:background bg:color9)]($style)'

[nodejs]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[c]
symbol = " "
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[rust]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[golang]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[php]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[java]
symbol = " "
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[kotlin]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[haskell]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[python]
symbol = ""
style = "bg:color6"
format = '[[ $symbol( $version) ](fg:background bg:color6)]($style)'

[docker_context]
symbol = ""
style = "bg:background"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color8)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:accent"
format = '[[  $time ](fg:background bg:accent)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:color2)'
error_symbol = '[](bold fg:color1)'
vimcmd_symbol = '[](bold fg:color2)'
vimcmd_replace_one_symbol = '[](bold fg:accent)'
vimcmd_replace_symbol = '[](bold fg:accent)'
vimcmd_visual_symbol = '[](bold fg:accent)'
